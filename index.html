const TODAY=new Date();
function daysAgo(ds){if(!ds)return 999;return Math.floor((TODAY-new Date(ds))/86400000);}
function daysUntil(ds){return Math.ceil((new Date(ds)-TODAY)/86400000);}
function urgency(m,data){
  const d=data[m.id]||{};
  const r=daysUntil(m.expiry);
  if(r<0)return"expired";
  if(d.lastContact){const lc=daysAgo(d.lastContact);if(lc>=14)return"red";if(lc>=7)return"amber";}
  if(r<=30)return"amber";
  return"green";
}

function Detail({member,data,onSave,onClose}){
  const d=data[member.id]||{};
  const [tab,setTab]=useState("brief");
  const [hw,setHw]=useState(d.homework||[]);
  const [newT,setNewT]=useState("");
  const [lastCall,setLastCall]=useState(d.lastCall||"");
  const [lastContact,setLastContact]=useState(d.lastContact||"");
  const [followUp,setFollowUp]=useState(d.followUp||"");
  const [transcript,setTranscript]=useState("");
  const [generating,setGenerating]=useState(false);
  const [briefing,setBriefing]=useState(null);
  const [copied,setCopied]=useState(false);
  const [briefCopied,setBriefCopied]=useState(false);
  const [guardrails,setGuardrails]=useState(d.guardrails||[]);
  const [newGuardrail,setNewGuardrail]=useState("");
  const [planSnapshot,setPlanSnapshot]=useState(d.planSnapshot||{goals:"",activeFocus:"",onHold:"",completed:""});
  const [privateNotes,setPrivateNotes]=useState(d.privateNotes||"");
  const [callBrief,setCallBrief]=useState(null);
  const [generatingBrief,setGeneratingBrief]=useState(false);

  function save(){onSave(member.id,{homework:hw,lastCall,lastContact,followUp,guardrails,planSnapshot,privateNotes});}
  function addT(){if(!newT.trim())return;setHw(h=>[...h,{text:newT.trim(),done:false}]);setNewT("");}
  function toggleT(i){setHw(h=>h.map((t,x)=>x===i?{...t,done:!t.done}:t));}
  function removeT(i){setHw(h=>h.filter((_,x)=>x!==i));}
  function addGuardrail(){if(!newGuardrail.trim())return;setGuardrails(g=>[...g,newGuardrail.trim()]);setNewGuardrail("");}
  function removeGuardrail(i){setGuardrails(g=>g.filter((_,x)=>x!==i));}

  async function generateCallBrief(){
    setGeneratingBrief(true);setCallBrief(null);
    const openHw=hw.filter(t=>!t.done).map(t=>t.text);
    const doneHw=hw.filter(t=>t.done).map(t=>t.text);
    const renewal=daysUntil(member.expiry);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:`You are a DeFi mentor assistant helping Juan Villar prepare for a call with ${member.name}.\n\nMEMBER DATA:\n- Program: ${member.program} | Step: ${member.step}\n- Membership renews in: ${renewal>0?renewal+' days':'EXPIRED'}\n- Last contact: ${lastContact||'not logged'}\n- Last call notes: ${lastCall||'none'}\n- Open homework: ${openHw.length?openHw.join('; '):'none'}\n- Completed homework: ${doneHw.length?doneHw.join('; '):'none'}\n\nPLAN SNAPSHOT:\n- Goals: ${planSnapshot.goals||'not set'}\n- Active focus: ${planSnapshot.activeFocus||'not set'}\n- On hold: ${planSnapshot.onHold||'not set'}\n- Completed milestones: ${planSnapshot.completed||'not set'}\n\nGUARDRAILS:\n${guardrails.length?guardrails.map((g,i)=>`${i+1}. ${g}`).join('\n'):'none'}\n\nReturn JSON only:\n{"whereWeAt":"2-3 sentences","focusToday":["item"],"openItems":["item"],"guardrailAlert":["alert"],"renewalNote":"string or null","talkingPoints":["point"]}`}]})});
      const dt=await res.json();
      const txt=dt.content?.find(b=>b.type==="text")?.text||"{}";
      setCallBrief(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setCallBrief({whereWeAt:"Error generating brief."});}
    setGeneratingBrief(false);
  }

  async function processTranscript(){
    if(!transcript.trim())return;

  const [search,setSearch]=useState("");
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    const stored=lsGet(STORAGE_KEY);
    if(stored){setData({...SEED_DATA,...stored});}
    else{setData(SEED_DATA);lsSet(STORAGE_KEY,SEED_DATA);}
    setLoaded(true);
  },[]);

  function saveMember(id,updates){
    const next={...data,[id]:{...(data[id]||{}),...updates}};
    setData(next);
    lsSet(STORAGE_KEY,next);
  }

  const members=useMemo(()=>{
    if(!search)return ALL_MEMBERS;
    return ALL_MEMBERS.filter(m=>m.name.toLowerCase().includes(search.toLowerCase()));
  },[search]);

  const byCol=useMemo(()=>{
    const g={};
    COLS.forEach(c=>g[c.key]=[]);
    members.forEach(m=>{if(g[m.step])g[m.step].push(m);});
    return g;
  },[members]);

  const stats=useMemo(()=>({
    red:ALL_MEMBERS.filter(m=>["red","expired"].includes(urgency(m,data))).length,
    amber:ALL_MEMBERS.filter(m=>urgency(m,data)==="amber").length,
    green:ALL_MEMBERS.filter(m=>urgency(m,data)==="green").length,
  }),[data]);

  const now=new Date();
  const timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  const dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  if(!loaded)return React.createElement("div",{style:{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:TEXT2,fontSize:14,fontFamily:FONT}},"LOADING COMMAND CENTER...");

  return React.createElement("div",{style:{background:BG,minHeight:"100vh",fontFamily:FONT,color:TEXT,paddingBottom:24}},
    React.createElement("div",{style:{background:BG2,borderBottom:`1px solid ${BORDER}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement("div",null,
        React.createElement("p",{style:{margin:0,fontSize:11,color:TEXT2,letterSpacing:2,fontWeight:700}},"DECENTRALIZED MASTERS"),
        React.createElement("p",{style:{margin:0,fontSize:20,fontWeight:700,color:TEXT,letterSpacing:1}},"MEMBER COMMAND CENTER")
      ),
      React.createElement("div",{style:{textAlign:"right"}},
        React.createElement("p",{style:{margin:0,fontSize:20,fontWeight:700,color:TEXT3,letterSpacing:2}},timeStr),
        React.createElement("p",{style:{margin:0,fontSize:11,color:TEXT2}},dateStr)
      )
    ),
    React.createElement("div",{style:{background:BG3,borderBottom:`1px solid ${BORDER}`,padding:"10px 20px",display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement("span",{style:{width:10,height:10,borderRadius:"50%",background:"#f85149",boxShadow:"0 0 8px #f85149",display:"inline-block"}}),
        React.createElement("span",{style:{fontSize:13,color:TEXT}},"CRITICAL"),
        React.createElement("span",{style:{fontSize:20,fontWeight:700,color:"#f85149"}},stats.red)
      ),
      React.createElement("div",{style:{width:1,height:24,background:BORDER}}),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement("span",{style:{width:10,height:10,borderRadius:"50%",background:"#d29922",boxShadow:"0 0 8px #d29922",display:"inline-block"}}),
        React.createElement("span",{style:{fontSize:13,color:TEXT}},"FOLLOW UP"),
        React.createElement("span",{style:{fontSize:20,fontWeight:700,color:"#d29922"}},stats.amber)
      ),
      React.createElement("div",{style:{width:1,height:24,background:BORDER}}),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement("span",{style:{width:10,height:10,borderRadius:"50%",background:"#3fb950",boxShadow:"0 0 8px #3fb950",display:"inline-block"}}),
        React.createElement("span",{style:{fontSize:13,color:TEXT}},"ON TRACK"),
        React.createElement("span",{style:{fontSize:20,fontWeight:700,color:"#3fb950"}},stats.green)
      ),
      React.createElement("div",{style:{marginLeft:"auto"}},
        React.createElement("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"SEARCH MEMBER...",style:{fontSize:13,borderRadius:6,border:`1px solid ${BORDER}`,padding:"7px 12px",background:BG4,color:TEXT,fontFamily:FONT,letterSpacing:0.5,width:200,outline:"none"}})
      )
    ),
    React.createElement("div",{style:{overflowX:"auto",padding:"16px 20px"}},
      React.createElement("div",{style:{display:"flex",gap:12,minWidth:"max-content"}},
        COLS.filter(c=>c.key!=="Advanced").map(col=>{
          const mems=byCol[col.key]||[];
          return React.createElement("div",{key:col.key,style:{width:190,flexShrink:0,display:"flex",flexDirection:"column",gap:8}},
            React.createElement("div",{style:{background:BG3,border:`1px solid ${col.color}`,borderRadius:8,padding:"8px 12px",textAlign:"center",boxShadow:`0 0 12px ${col.glow}`}},
              React.createElement("p",{style:{margin:0,fontSize:11,fontWeight:700,color:col.color,letterSpacing:2}},col.label),
              React.createElement("p",{style:{margin:0,fontSize:22,fontWeight:700,color:TEXT}},mems.length)
            ),
            React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:520,overflowY:"auto",paddingRight:2}},
              mems.map(m=>React.createElement(Card,{key:m.id,member:m,data,onClick:()=>setSelected(m)})),
              mems.length===0&&React.createElement("p",{style:{fontSize:12,color:TEXT2,textAlign:"center",padding:"12px 0",margin:0,opacity:0.4}},"—")
            )
          );
        })
      )
    ),
    selected&&React.createElement(Detail,{member:selected,data,onSave:saveMember,onClose:()=>setSelected(null)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
